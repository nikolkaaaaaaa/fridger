<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>My Fridge</title>

  <style>
    :root {
      --cream:   #F7F5F0;
      --white:   #FFFFFF;
      --ink:     #1C1C1E;
      --muted:   #6C6C70;
      --border:  #E0DDD6;
      --green:   #2D6A4F;
      --green-light: #D8EDDF;
      --amber:   #E07B39;
      --amber-light: #FDEBD8;
      --radius:  14px;
      --shadow:  0 2px 12px rgba(0,0,0,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Tab bar ─────────────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 69px;
      z-index: 9;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    /* ── Panels ──────────────────────────────────────────────── */
    .panel { display: none; padding: 16px 16px 32px; }
    .panel.active { display: block; }

    /* ── Section label ───────────────────────────────────────── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 8px 4px;
    }
    .section-label:first-child { margin-top: 4px; }

    /* ── Ingredient card ─────────────────────────────────────── */
    .ingredient-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .ing-item {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .ing-item.checked {
      border-color: var(--green);
      background: var(--green-light);
    }
    .ing-check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--white);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .ing-item.checked .ing-check {
      background: var(--green);
      border-color: var(--green);
    }
    .ing-check svg { display: none; }
    .ing-item.checked .ing-check svg { display: block; }
    .ing-name {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.25;
    }

    /* ── Clear button ────────────────────────────────────────── */
    .clear-btn {
      display: block;
      margin: 16px auto 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 7px 18px;
      border-radius: 99px;
      cursor: pointer;
    }

    /* ── Find recipes button ─────────────────────────────────── */
    .find-btn {
      width: 100%;
      padding: 15px;
      background: var(--green);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      margin-top: 20px;
      cursor: pointer;
      letter-spacing: -0.2px;
      box-shadow: 0 3px 10px rgba(45,106,79,0.25);
      -webkit-tap-highlight-color: transparent;
    }
    .find-btn:active { filter: brightness(0.92); }

    /* ── Selected summary pill ───────────────────────────────── */
    .summary-pill {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      display: inline-block;
      margin-top: 8px;
    }
    .summary-pill strong { color: var(--ink); }

    /* ── Recipe cards ────────────────────────────────────────── */
    .recipe-list { display: flex; flex-direction: column; gap: 12px; }

    .recipe-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .recipe-card.can-make { border-color: var(--green); }
    .recipe-card.almost   { border-color: var(--amber); }

    .recipe-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .recipe-title { font-size: 0.95rem; font-weight: 700; }
    .recipe-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .badge-ready  { background: var(--green-light); color: var(--green); }
    .badge-almost { background: var(--amber-light); color: var(--amber); }
    .badge-no     { background: var(--border); color: var(--muted); }

    .recipe-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    .recipe-card.open .recipe-body { display: block; }

    .recipe-ingredients {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ing-tag {
      font-size: 0.75rem;
      padding: 3px 9px;
      border-radius: 99px;
      background: var(--cream);
      border: 1px solid var(--border);
    }
    .ing-tag.have     { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .ing-tag.missing  { background: var(--amber-light); border-color: var(--amber); color: var(--amber); }

    .recipe-instructions {
      margin-top: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--ink);
      white-space: pre-wrap;
    }
    .instructions-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 14px;
      margin-bottom: 4px;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty .emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; line-height: 1.5; }

    /* ── Filter bar ──────────────────────────────────────────── */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }
    .filter-chip {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--muted);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-chip.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
  </style>
</head>
<body>

<header>
  <h1>fridger</h1>
  <p>let me cook</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('fridge')">ingredients</button>
  <button class="tab-btn" onclick="switchTab('recipes')">recipes</button>
</div>


<div id="panel-fridge" class="panel active">

  <div id="fridge-content"></div>

  <div style="margin-top:12px;">
    <span class="summary-pill">
      <strong id="checked-count">0</strong> items in your fridge
    </span>
  </div>
  <button class="find-btn" onclick="switchTab('recipes')">find Recipes →</button>
  <button class="clear-btn" onclick="clearAll()">clear all</button>

</div>


<div id="panel-recipes" class="panel">

  <div class="filter-row">
    <button class="filter-chip active" onclick="setFilter('all', this)">all</button>
    <button class="filter-chip" onclick="setFilter('ready', this)">can make</button>
    <button class="filter-chip" onclick="setFilter('almost', this)">almost</button>
  </div>

  <div id="recipe-list" class="recipe-list" style="margin-top:12px;"></div>

</div>

<script>

const GROCERY_LIST = {
  "mlieko a vajicka": [
    "vajicka", "mlieko", "maslo", "alternativne mlieko", "syr", "jogurt", "mozzarella", "feta", ""
  ],
  "Vegetables": [
    "Onion", "Garlic", "Tomato", "Spinach", "Bell pepper", "Zucchini",
    "Carrot", "Potato", "Broccoli", "Mushrooms", "Cucumber", "Avocado"
  ],
  "Meat & Fish": [
    "Chicken breast", "Ground beef", "Bacon", "Salmon", "Tuna (can)"
  ],
  "Pantry": [
    "fusilli", "spaghetti", "rice", "bread", "sriracha", "canned tomatoes",
    "Chickpeas (can)", "Lentils", "Chicken stock", "Flour"
  ],
  "Fresh herbs": [
    "Basil", "Parsley", "Cilantro", "Thyme"
  ]
};

const RECIPES = [
  {
    name: "Classic Omelette",
    needs: ["Eggs", "Butter", "Cheddar"],
    instructions:
      "1. Beat 3 eggs with a pinch of salt.\n" +
      "2. Melt butter in a non-stick pan over medium heat.\n" +
      "3. Pour in eggs, let the edges set, then gently fold.\n" +
      "4. Add grated cheddar before folding in half.\n" +
      "5. Slide onto a plate and serve immediately."
  },
  {
    name: "Pasta Aglio e Olio",
    needs: ["Pasta", "Garlic", "Olive oil", "Parmesan", "Parsley"],
    instructions:
      "1. Cook pasta al dente, reserve ½ cup pasta water.\n" +
      "2. Slice garlic thinly and toast in olive oil until golden.\n" +
      "3. Add pasta + a splash of pasta water to the pan.\n" +
      "4. Toss vigorously off-heat with parmesan.\n" +
      "5. Finish with fresh parsley and black pepper."
  },
  {
    name: "Tomato & Egg Stir-fry",
    needs: ["Eggs", "Tomato", "Garlic", "Olive oil"],
    instructions:
      "1. Scramble eggs lightly and set aside.\n" +
      "2. Sauté garlic, add chopped tomatoes and cook until soft.\n" +
      "3. Return eggs to the pan, toss together.\n" +
      "4. Season with salt and sugar to taste.\n" +
      "5. Serve over rice."
  },
  {
    name: "Simple Chicken & Rice",
    needs: ["Chicken breast", "Rice", "Garlic", "Olive oil", "Chicken stock"],
    instructions:
      "1. Season chicken breast with salt, pepper, and garlic.\n" +
      "2. Sear in olive oil until golden, about 4 min each side.\n" +
      "3. Remove chicken, toast rice in the same pan 1 min.\n" +
      "4. Add chicken stock (2:1 ratio), bring to a boil.\n" +
      "5. Nestle chicken back in, cover and simmer 18 min."
  },
  {
    name: "Spinach & Mushroom Sauté",
    needs: ["Spinach", "Mushrooms", "Garlic", "Butter", "Parmesan"],
    instructions:
      "1. Melt butter over medium-high heat.\n" +
      "2. Sauté sliced mushrooms until browned, ~5 min.\n" +
      "3. Add garlic and cook 30 seconds.\n" +
      "4. Wilt in spinach, season with salt & pepper.\n" +
      "5. Finish with grated parmesan."
  },
  {
    name: "Avocado Toast",
    needs: ["Avocado", "Bread"],
    instructions:
      "1. Toast bread to your liking.\n" +
      "2. Mash avocado with a fork, season with salt and lemon juice.\n" +
      "3. Spread on toast.\n" +
      "4. Optional: top with a fried egg, chili flakes, or sliced tomato."
  },
  {
    name: "Greek Yogurt Bowl",
    needs: ["Greek yogurt", "Cucumber", "Garlic", "Olive oil"],
    instructions:
      "1. Grate cucumber, squeeze out excess water.\n" +
      "2. Mix into Greek yogurt with minced garlic.\n" +
      "3. Drizzle with olive oil, season with salt.\n" +
      "4. Serve as a dip or side with bread."
  }
];


let checked = JSON.parse(localStorage.getItem("fridge_checked") || "[]");
let recipeFilter = "all";

function save() {
  localStorage.setItem("fridge_checked", JSON.stringify(checked));
}

// ── Render fridge ────────────────────────────────────────
function renderFridge() {
  const container = document.getElementById("fridge-content");
  container.innerHTML = "";

  for (const [category, items] of Object.entries(GROCERY_LIST)) {
    const label = document.createElement("div");
    label.className = "section-label";
    label.textContent = category;
    container.appendChild(label);

    const grid = document.createElement("div");
    grid.className = "ingredient-grid";

    for (const item of items) {
      const isChecked = checked.includes(item);
      const div = document.createElement("div");
      div.className = "ing-item" + (isChecked ? " checked" : "");
      div.innerHTML = `
        <div class="ing-check">
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="ing-name">${item}</span>
      `;
      div.addEventListener("click", () => toggleItem(item));
      grid.appendChild(div);
    }

    container.appendChild(grid);
  }

  document.getElementById("checked-count").textContent = checked.length;
}

function toggleItem(item) {
  const idx = checked.indexOf(item);
  if (idx === -1) checked.push(item);
  else checked.splice(idx, 1);
  save();
  renderFridge();
}

function clearAll() {
  checked = [];
  save();
  renderFridge();
}

function renderRecipes() {
  const container = document.getElementById("recipe-list");
  container.innerHTML = "";

  const scored = RECIPES.map(r => {
    const total   = r.needs.length;
    const have    = r.needs.filter(i => checked.includes(i)).length;
    const missing = r.needs.filter(i => !checked.includes(i));
    const ratio   = total === 0 ? 1 : have / total;
    let status    = ratio === 1 ? "ready" : ratio >= 0.6 ? "almost" : "no";
    return { ...r, have, total, missing, ratio, status };
  });

  scored.sort((a, b) => {
    const order = { ready: 0, almost: 1, no: 2 };
    if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
    return a.name.localeCompare(b.name);
  });

  const filtered = scored.filter(r =>
    recipeFilter === "all" ||
    (recipeFilter === "ready" && r.status === "ready") ||
    (recipeFilter === "almost" && r.status === "almost")
  );

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="emoji">🥄</div>
        <p>No recipes match your current filter.<br>Try "All" or check more items in your fridge.</p>
      </div>`;
    return;
  }

  for (const r of filtered) {
    const card = document.createElement("div");
    card.className = "recipe-card" + (r.status === "ready" ? " can-make" : r.status === "almost" ? " almost" : "");

    const badgeClass = r.status === "ready" ? "badge-ready" : r.status === "almost" ? "badge-almost" : "badge-no";
    const badgeText  = r.status === "ready" ? "Ready to make"
                     : r.status === "almost" ? `Missing ${r.missing.length}`
                     : `Need ${r.total - r.have} more`;

    const ingTags = r.needs.map(i =>
      `<span class="ing-tag ${checked.includes(i) ? "have" : "missing"}">${i}</span>`
    ).join("");

    card.innerHTML = `
      <div class="recipe-header">
        <span class="recipe-title">${r.name}</span>
        <span class="recipe-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="recipe-body">
        <div class="recipe-ingredients">${ingTags}</div>
        <div class="instructions-label">Instructions</div>
        <div class="recipe-instructions">${r.instructions}</div>
      </div>
    `;

    card.querySelector(".recipe-header").addEventListener("click", () => {
      card.classList.toggle("open");
    });

    container.appendChild(card);
  }
}

function switchTab(tab) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("panel-" + tab).classList.add("active");
  document.querySelectorAll(".tab-btn")[tab === "fridge" ? 0 : 1].classList.add("active");
  if (tab === "recipes") renderRecipes();
}

function setFilter(filter, el) {
  recipeFilter = filter;
  document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderRecipes();
}

renderFridge();
</script>
</body>
</html>
